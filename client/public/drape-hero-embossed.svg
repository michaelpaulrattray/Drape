<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <!-- Emboss/bevel filter for 3D sculptural effect -->
    <filter id="emboss" x="-10%" y="-10%" width="120%" height="120%">
      <!-- Create a blurred alpha for lighting -->
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <!-- Top-left highlight (light source) -->
      <feSpecularLighting in="blur" surfaceScale="8" specularConstant="0.8" specularExponent="25" result="specLight">
        <fePointLight x="-200" y="-200" z="400"/>
      </feSpecularLighting>
      <feComposite in="specLight" in2="SourceAlpha" operator="in" result="specClip"/>
      <!-- Bottom-right shadow -->
      <feOffset in="SourceAlpha" dx="2" dy="2" result="offsetShadow"/>
      <feGaussianBlur in="offsetShadow" stdDeviation="3" result="blurShadow"/>
      <!-- Inner shadow for depth -->
      <feOffset in="SourceAlpha" dx="-1" dy="-1" result="offsetHighlight"/>
      <feGaussianBlur in="offsetHighlight" stdDeviation="2" result="blurHighlight"/>
      <!-- Compose layers -->
      <feMerge>
        <feMergeNode in="blurShadow"/>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="specClip"/>
      </feMerge>
    </filter>
    <!-- Subtle drop shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <text 
      x="400" y="145" 
      text-anchor="middle"
      font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" 
      font-size="180" 
      font-weight="600" 
      letter-spacing="-8"
      fill="#e8e5e0"
      filter="url(#emboss)"
    >drape</text>
  </g>
</svg>
